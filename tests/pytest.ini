[pytest]
# this file is the rootdir anchor when invoked as `pytest tests/` from repo root.
# discovery walks the tests/ tree directly, so no `testpaths` line is needed.
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    slow: tests that take more than 5 seconds (opt-in via `pytest -m slow`)
addopts = -ra --strict-markers
